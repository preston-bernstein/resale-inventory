name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same branch/PR so pushes don't queue behind
# their own stale checks.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  checks:
    name: typecheck, lint, unit/API tests, fallow audit, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # fallow audit diffs against the merge-base with the default
          # branch; a shallow checkout wouldn't have that history available.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      # Runs against a scratch SQLite DB via BOOKSELLER_DB_PATH, set inside
      # vitest.config.ts's test.env block — never the real data/inventory.db,
      # which doesn't exist in a fresh checkout anyway.
      - run: npm run test:coverage

      # Scoped to files changed vs. the default branch; fails the job on any
      # dead code, duplication, or complexity finding this PR introduces.
      # Pre-existing findings on files a PR happens to touch are reported
      # but don't fail the build (fallow's own new-vs-inherited attribution).
      - run: npx fallow audit --coverage coverage/coverage-final.json

      - run: npm run build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      # playwright.config.ts starts its own `next dev` webServer against a
      # scratch DB/photos dir under .playwright-scratch/ — nothing to wire
      # up here.
      - run: npm run test:e2e

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

  mutation:
    name: Stryker mutation testing
    runs-on: ubuntu-latest
    # Mutation testing re-runs the suite once per mutant and is slow — only
    # worth the cost on a PR under review, not on every push to main.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npm run test:mutation

      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation/
          retention-days: 14
